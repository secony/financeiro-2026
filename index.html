<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Controle Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--surface:#1A1D27;--surface2:#22263A;--border:#2A2F45;
  --text:#F0F2FF;--muted:#6B7280;--accent:#7C3AED;--accent-glow:rgba(124,58,237,0.18);
  --green:#22C55E;--green-dim:rgba(34,197,94,0.12);
  --red:#F87171;--red-dim:rgba(248,113,113,0.12);
  --font-head:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;
  --radius:12px;--radius-sm:8px;
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;line-height:1.5;overflow-x:hidden}
.shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:auto 1fr;min-height:100vh;overflow-x:hidden}

/* TOPBAR */
.topbar{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{font-family:var(--font-head);font-size:16px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
.topbar-brand span{color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-year-nav{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 4px}
.year-nav-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 7px;border-radius:14px;font-size:13px;transition:all .15s;line-height:1}
.year-nav-btn:hover{background:var(--border);color:var(--text)}
.year-display{font-size:12px;font-weight:600;color:var(--text);padding:2px 4px;min-width:36px;text-align:center}
.user-badge{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent-glow);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:var(--font-body);transition:all .15s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.hamburger{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:4px}
.hamburger svg{width:22px;height:22px}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px 12px;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.sidebar-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;padding:8px 10px 4px;margin-top:8px}
.nav-btn{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13.5px;font-weight:500;cursor:pointer;transition:background .15s,color .15s;width:100%;text-align:left}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--accent-glow);color:var(--text)}
.nav-btn.active .nav-dot{background:var(--accent)}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .15s}
.nav-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--green-dim);color:var(--green);font-weight:600}
.nav-tag.empty{background:var(--surface2);color:var(--muted)}
.nav-tag.loading{background:var(--surface2);color:var(--muted);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MAIN */
.main{padding:28px 28px 60px;max-width:960px}
.view{display:none}.view.active{display:block}

/* PAGE HEADER */
.page-header{margin-bottom:28px}
.page-header h1{font-family:var(--font-head);font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.2}
.page-header p{color:var(--muted);font-size:13px;margin-top:4px}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;flex-direction:column;gap:4px;transition:border-color .15s}
.stat-card:hover{border-color:var(--accent)}
.stat-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.stat-value{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:-.5px;margin-top:2px}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.accent{color:var(--accent)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}
.stat-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px;width:fit-content}
.badge-green{background:var(--green-dim);color:var(--green)}.badge-red{background:var(--red-dim);color:var(--red)}

/* META CARD */
.meta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;flex-direction:column;gap:10px;transition:border-color .2s}
.meta-card.atingida{border-color:var(--green)}
.meta-card.nao-atingida{border-color:var(--red)}
.meta-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.meta-info{display:flex;flex-direction:column;gap:3px}
.meta-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.meta-valor{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:-.5px}
.meta-valor.green{color:var(--green)}.meta-valor.red{color:var(--red)}
.meta-edit-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:var(--font-body);transition:all .15s;white-space:nowrap;flex-shrink:0}
.meta-edit-btn:hover{border-color:var(--accent);color:var(--accent)}
.meta-progress-bg{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}
.meta-progress-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1);width:0%}
.meta-sub-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted)}
.meta-sub-row .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}

/* MODAL META */
.modal-meta{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:360px;transform:translateY(20px) scale(.98);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.modal-overlay.open .modal-meta{transform:translateY(0) scale(1)}
@media(max-width:720px){
  .modal-meta{border-radius:20px 20px 0 0;padding:24px 20px 36px;max-width:100%;transform:translateY(100%)}
  .modal-overlay.open .modal-meta{transform:translateY(0) scale(1)}
}

/* SECTION TITLE */
.section-title{font-family:var(--font-head);font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;margin-top:30px}

/* CATEGORY BARS */
.cat-list{display:flex;flex-direction:column;gap:10px}
.cat-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cat-name-row{display:flex;align-items:center;gap:10px}
.cat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.cat-name{font-size:13.5px;font-weight:600}
.cat-amount{font-family:var(--font-head);font-size:15px;font-weight:700}
.cat-bar-bg{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1);width:0%}

/* WEEKLY TABLE */
.week-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.week-table{width:100%;border-collapse:collapse;font-size:13px}
.week-table th{padding:11px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;background:var(--surface2);border-bottom:1px solid var(--border)}
.week-table td{padding:11px 16px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
.week-table tr:last-child td{border-bottom:none}
.week-table tr:hover td{background:var(--surface2)}
.week-table .total-row td{font-weight:700;color:var(--text);background:var(--surface2);border-top:1px solid var(--border)}
.cat-cell{display:flex;align-items:center;gap:8px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.num-cell{text-align:right;color:var(--muted)}
.num-cell.has-value{color:var(--text);font-weight:500}

/* INCOME BLOCK */
.income-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.income-block-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.income-row{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);font-size:13.5px;gap:12px}
.income-row:last-child{border-bottom:none}
.income-row .desc{color:var(--text);font-weight:500;display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap}
.income-row .val{font-family:var(--font-head);font-weight:600;color:var(--green);white-space:nowrap}
.income-row .week-tag{font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:20px}
.row-actions{display:flex;gap:4px;flex-shrink:0}
.btn-row-action{background:none;border:none;color:var(--muted);cursor:pointer;padding:3px 7px;border-radius:5px;font-size:12px;transition:all .15s}
.btn-row-action:hover{background:var(--surface2);color:var(--text)}
.btn-row-action.del:hover{background:var(--red-dim);color:var(--red)}
.btn-row-action.edit:hover{background:var(--accent-glow);color:var(--accent)}

/* ANUAL TABLE */
.anual-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto}
.anual-table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
.anual-table th{padding:10px 12px;text-align:right;font-size:11px;font-weight:600;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border)}
.anual-table th:first-child{text-align:left}
.anual-table td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;color:var(--muted)}
.anual-table td:first-child{text-align:left;color:var(--text);font-weight:600}
.anual-table tr:last-child td{border-bottom:none}
.anual-table td.has-v{color:var(--text)}
.anual-table tr.section-sep td{padding-top:18px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-top:1px solid var(--border)}
.anual-table tr.highlight-row td{background:rgba(124,58,237,.07)}
.anual-table .val-green{color:var(--green)!important}
.anual-table .val-red{color:var(--red)!important}
.anual-table .val-accent{color:var(--accent)!important;font-weight:700!important}

/* CHART */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 20px 10px;margin-bottom:28px}
.chart-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:16px}
canvas{display:block}

/* BUTTONS */
.btn-add-primary{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-family:var(--font-body);font-size:13.5px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-add-primary:hover{opacity:.85}
.btn-export{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-export:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.export-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:440px;transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-family:var(--font-head);font-size:18px;font-weight:700;margin-bottom:6px}
.modal p{font-size:13px;color:var(--muted);margin-bottom:22px}
.modal-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface2);border-radius:8px;padding:4px}
.modal-tab{flex:1;padding:7px;border:none;background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .15s}
.modal-tab.active{background:var(--accent);color:#fff}
.modal-tab:disabled{opacity:.3;cursor:not-allowed}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;display:block;margin-bottom:6px}
.form-input,.form-select{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-select option{background:var(--surface2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:22px}
.btn-cancel{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:14px;cursor:pointer;transition:all .15s}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}
.btn-save{flex:2;padding:10px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-save:hover{opacity:.85}
.btn-save:disabled{opacity:.4;cursor:not-allowed}

/* AUTH */
#authScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
.auth-logo{font-size:36px;margin-bottom:16px}
.auth-title{font-family:var(--font-head);font-size:22px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.auth-error{background:var(--red-dim);border:1px solid var(--red);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;text-align:left}
.auth-tabs{display:flex;gap:4px;margin-bottom:22px;background:var(--surface2);border-radius:8px;padding:4px}
.auth-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .15s}
.auth-tab.active{background:var(--accent);color:#fff}

/* LOADING / EMPTY */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px;color:var(--muted)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:40px;text-align:center;color:var(--muted)}
.empty-state .icon{font-size:32px;margin-bottom:12px}
.empty-state .title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-state .sub{font-size:13px;margin-bottom:18px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;z-index:999;transform:translateY(20px);opacity:0;transition:all .25s;pointer-events:none;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}

/* MOBILE */
@media(max-width:720px){
  .shell{display:block;width:100vw}
  .main{padding:16px 14px 100px;width:100vw;max-width:100vw;overflow-x:hidden;box-sizing:border-box}
  .topbar{padding:0 14px;height:52px;width:100vw;max-width:100vw}
  .topbar-brand{font-size:14px;gap:7px}
  .btn-logout{display:none}
  .hamburger{display:block}
  .user-badge .email-text{display:none}
  .sidebar{display:none!important;position:fixed;top:52px;left:0;right:0;bottom:0;z-index:200;height:calc(100vh - 52px)}
  .sidebar.open{display:flex!important}
  .page-header h1{font-size:19px;overflow-wrap:break-word;word-break:break-word;max-width:calc(100vw - 28px)}
  .page-header p{font-size:12px;overflow-wrap:break-word;word-break:break-word;max-width:calc(100vw - 28px)}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;width:100%;max-width:100%}
  .stat-card{padding:14px}
  .stat-label{font-size:10px}
  .stat-value{font-size:17px}
  .stat-sub{font-size:10px}
  .stat-badge{font-size:10px}
  .week-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%}
  .week-scroll-hint{display:block;font-size:11px;color:var(--muted);margin-bottom:8px}
  .week-table{min-width:480px;font-size:12px}
  .week-table th,.week-table td{padding:8px 10px}
  .anual-table-wrap{display:none}
  .cat-item{padding:12px 14px;overflow:hidden;max-width:100%}
  .cat-icon{width:26px;height:26px;font-size:12px}
  .cat-name{font-size:13px}
  .cat-amount{font-size:14px}
  .cat-header{margin-bottom:8px}
  .income-row{padding:10px 14px;font-size:13px;overflow-wrap:break-word;word-break:break-word}
  .income-block-head{padding:11px 14px}
  .btn-add-primary{width:100%;justify-content:center;padding:12px;font-size:14px}
  .modal-overlay{align-items:flex-end;padding:0}
  .modal{border-radius:20px 20px 0 0;padding:24px 20px 36px;max-width:100%;transform:translateY(100%)}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal h2{font-size:17px}
  .modal p{font-size:12px;margin-bottom:16px}
  .form-row{grid-template-columns:1fr}
  .form-input,.form-select{font-size:16px}
  .section-title{font-size:11px;margin-top:22px;margin-bottom:10px}
  .chart-wrap{padding:16px 14px 8px}
  .toast{bottom:16px;right:14px;left:14px;max-width:100%;text-align:center}
  .export-row{gap:6px}
  .btn-export{font-size:11px;padding:6px 10px}
  ::-webkit-scrollbar{display:none}
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* ── SPLASH SCREEN ── */
#splashScreen{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .4s ease, visibility .4s ease;
}
#splashScreen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.splash-logo{font-size:48px;color:var(--accent);font-family:var(--font-head);font-weight:700;animation:splashPulse 1.4s ease-in-out infinite}
.splash-brand{font-family:var(--font-head);font-size:18px;font-weight:600;color:var(--muted);letter-spacing:.5px}
.splash-bar-bg{width:160px;height:3px;background:var(--surface2);border-radius:99px;overflow:hidden}
.splash-bar-fill{height:100%;width:0%;background:var(--accent);border-radius:99px;animation:splashBar 1.2s ease forwards}
@keyframes splashPulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes splashBar{0%{width:0%}60%{width:80%}100%{width:100%}}

/* ── AUTH SCREEN: começa invisível, faz fade in ── */
#authScreen{
  position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;visibility:hidden;transition:opacity .3s ease, visibility .3s ease;
}
#authScreen.visible{opacity:1;visibility:visible}

/* ── APP SHELL: fade in ao entrar ── */
#appShell{
  opacity:0;transition:opacity .35s ease;
}
#appShell.visible{opacity:1}

/* ── TRANSIÇÕES DE NAVEGAÇÃO ── */
.view{display:none;animation:fadeSlideIn .22s ease}
.view.active{display:block}
@keyframes fadeSlideIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── MODAL: transição já existia, melhora o backdrop ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);
  z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:28px;width:100%;max-width:440px;
  transform:translateY(16px) scale(.98);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}

/* ── BOTÕES: feedback de clique ── */
.btn-add-primary{transition:opacity .15s, transform .1s}
.btn-add-primary:active{transform:scale(.97)}
.btn-export{transition:all .15s}
.btn-export:active{transform:scale(.96)}
.nav-btn{transition:background .15s, color .15s, transform .1s}
.nav-btn:active{transform:scale(.97)}
.stat-card{transition:border-color .2s, transform .15s}
.stat-card:hover{transform:translateY(-1px)}

/* ── SIDEBAR MOBILE: slide in ── */
@media(max-width:720px){
  .modal{transform:translateY(100%);border-radius:20px 20px 0 0;padding:24px 20px 36px;max-width:100%}
  .modal-overlay.open .modal{transform:translateY(0) scale(1)}
  .sidebar{transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)!important}
}
</style>
</head>
<body>

<!-- SPLASH SCREEN — aparece enquanto Firebase verifica a sessão -->
<div id="splashScreen">
  <div class="splash-logo">◈</div>
  <div class="splash-brand">Controle Financeiro</div>
  <div class="splash-bar-bg"><div class="splash-bar-fill"></div></div>
</div>

<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">◈</div>
    <div class="auth-title">Controle Financeiro</div>
    <div class="auth-sub">Acesse sua conta para continuar</div>
    <div class="auth-tabs">

    <div class="form-group">

    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" type="password" id="authPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-save" style="width:100%;padding:12px;font-size:15px;border-radius:10px;margin-top:6px" id="authBtn" onclick="handleAuth()">Entrar</button>
  </div>
</div>

<div class="shell" id="appShell">
  <header class="topbar">
    <div class="topbar-brand"><span>◈</span> Controle Financeiro</div>
    <div class="topbar-right">
      <div class="topbar-year-nav">
        <button class="year-nav-btn" onclick="changeYear(-1)">‹</button>
        <span class="year-display" id="yearDisplay">—</span>
        <button class="year-nav-btn" onclick="changeYear(1)">›</button>
      </div>
      <div class="user-badge">

        <span class="email-text" id="userEmail" style="font-size:12px;color:var(--muted)"></span>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Sair</button>
      <button class="hamburger" id="hamburgerBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <span class="sidebar-label">Visão Geral</span>
    <button class="nav-btn active" data-view="anual">Resumo Anual <span class="nav-dot"></span></button>
    <span class="sidebar-label">Meses</span>
    <button class="nav-btn" data-view="jan">Janeiro   <span class="nav-tag loading" id="tag-jan">…</span></button>
    <button class="nav-btn" data-view="fev">Fevereiro <span class="nav-tag loading" id="tag-fev">…</span></button>
    <button class="nav-btn" data-view="mar">Março     <span class="nav-tag loading" id="tag-mar">…</span></button>
    <button class="nav-btn" data-view="abr">Abril     <span class="nav-tag loading" id="tag-abr">…</span></button>
    <button class="nav-btn" data-view="mai">Maio      <span class="nav-tag loading" id="tag-mai">…</span></button>
    <button class="nav-btn" data-view="jun">Junho     <span class="nav-tag loading" id="tag-jun">…</span></button>
    <button class="nav-btn" data-view="jul">Julho     <span class="nav-tag loading" id="tag-jul">…</span></button>
    <button class="nav-btn" data-view="ago">Agosto    <span class="nav-tag loading" id="tag-ago">…</span></button>
    <button class="nav-btn" data-view="set">Setembro  <span class="nav-tag loading" id="tag-set">…</span></button>
    <button class="nav-btn" data-view="out">Outubro   <span class="nav-tag loading" id="tag-out">…</span></button>
    <button class="nav-btn" data-view="nov">Novembro  <span class="nav-tag loading" id="tag-nov">…</span></button>
    <button class="nav-btn" data-view="dez">Dezembro  <span class="nav-tag loading" id="tag-dez">…</span></button>

  <main class="main" id="mainContent">
    <section class="view active" id="view-anual">
      <div class="loading-state"><div class="spinner"></div><span>Carregando dados…</span></div>
    </section>
    <section class="view" id="view-jan"></section>
    <section class="view" id="view-fev"></section>
    <section class="view" id="view-mar"></section>
    <section class="view" id="view-abr"></section>
    <section class="view" id="view-mai"></section>
    <section class="view" id="view-jun"></section>
    <section class="view" id="view-jul"></section>
    <section class="view" id="view-ago"></section>
    <section class="view" id="view-set"></section>
    <section class="view" id="view-out"></section>
    <section class="view" id="view-nov"></section>
    <section class="view" id="view-dez"></section>
  </main>
</div>

<!-- MODAL LANÇAMENTO / EDIÇÃO -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Novo lançamento</h2>
    <p id="modalSub"></p>
    <div class="modal-tabs" id="modalTabs">
      <button class="modal-tab active" onclick="setModalTab('gasto')">Gasto</button>
      <button class="modal-tab" onclick="setModalTab('receita')">Receita</button>
      <button class="modal-tab" onclick="setModalTab('rendimento')">Rendimento</button>
    </div>
    <div id="formGasto">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select class="form-select" id="fCategoria">
            <option>Alimentação</option><option>Transporte</option><option>Lazer</option>
            <option>Saúde</option><option>Educação</option><option>Moradia</option>
            <option>Roupas</option><option>Outros</option>

        <div class="form-group">
          <label class="form-label">Semana</label>
          <select class="form-select" id="fSemana">
            <option value="1">Semana 1</option><option value="2">Semana 2</option>
            <option value="3">Semana 3</option><option value="4">Semana 4</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Valor (R$)</label>
        <input class="form-input" type="number" id="fValorGasto" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Descrição (opcional)</label>
        <input class="form-input" type="text" id="fDescGasto" placeholder="Ex: Mercado, iFood…">
      </div>
    </div>
    <div id="formReceita" style="display:none">
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <input class="form-input" type="text" id="fDescReceita" placeholder="Ex: Salário, Freela…">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor (R$)</label>
          <input class="form-input" type="number" id="fValorReceita" placeholder="0,00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Semana</label>
          <select class="form-select" id="fSemanaReceita">
            <option value="1">Semana 1</option><option value="2">Semana 2</option>
            <option value="3">Semana 3</option><option value="4">Semana 4</option>
          </select>
        </div>
      </div>
    </div>
    <div id="formRendimento" style="display:none">
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <input class="form-input" type="text" id="fDescRend" placeholder="Ex: Juros da Caixa…">
      </div>
      <div class="form-group">
        <label class="form-label">Valor (R$)</label>
        <input class="form-input" type="number" id="fValorRend" placeholder="0,00" step="0.01" min="0">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btnSalvar" onclick="salvarLancamento()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL META -->
<div class="modal-overlay" id="modalMetaOverlay">
  <div class="modal-meta">
    <h2 style="font-family:var(--font-head);font-size:18px;font-weight:700;margin-bottom:6px">Meta de Economia</h2>
    <p id="modalMetaSub" style="font-size:13px;color:var(--muted);margin-bottom:22px"></p>
    <div class="form-group">
      <label class="form-label">Meta para este mês (R$)</label>
      <input class="form-input" type="number" id="fMetaValor" placeholder="500,00" step="0.01" min="0">
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:-8px;margin-bottom:18px">
      Deixe em branco para usar o padrão de R$500,00
    </p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalMeta()">Cancelar</button>
      <button class="btn-save" onclick="salvarMeta()">Salvar meta</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, setDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLbpQ4VI1tRFeIBPUdbSdqUnkewJBQAMo",
  authDomain: "financeiro-2026-cd344.firebaseapp.com",
  projectId: "financeiro-2026-cd344",
  storageBucket: "financeiro-2026-cd344.firebasestorage.app",
  messagingSenderId: "1037623065269",
  appId: "1:1037623065269:web:c1e51af6934428a3e55cfc"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db   = getFirestore(fbApp);

/* ── CONSTANTES ── */
const MESES_IDS   = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const MESES_NOMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CATS        = ['Alimentação','Transporte','Lazer','Saúde','Educação','Moradia','Roupas','Outros'];
const CAT_COLORS  = ['#F97316','#3B82F6','#EC4899','#22C55E','#A855F7','#F59E0B','#14B8A6','#6B7280'];
const CAT_ICONS   = ['🍽️','🚌','🎮','❤️','📚','🏠','👕','📦'];
// META_ECONOMIA agora é dinâmica — veja getMeta(mesId)

/* Saldo inicial por ano — adicione novos anos aqui conforme necessário */
const SALDO_INICIAL_ANO = { 2026: 2480 };
const META_PADRAO = 500;

/* ── ESTADO ── */
let uid = null;
let currentMes = null;
let currentTab = 'gasto';
let editingItem = null; // { mesId, tipo, id } quando em modo edição
let editingMetaMes = null; // mesId sendo editado na meta
let unsubListeners = {};
let DATA = {};
let METAS = {}; // METAS[mesId] = valor ou null (usa META_PADRAO)
let CURRENT_YEAR = new Date().getFullYear();

function resetData() {
  DATA = {};
  MESES_IDS.forEach(id => { DATA[id] = { gastos:[], receitas:[], rendimentos:[] }; });
}
resetData();

/* ── UTILS ── */
const fmt    = v => v === 0 ? '—' : 'R$' + v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtVal = v => 'R$' + v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct    = (v,t) => t === 0 ? 0 : Math.round(v/t*100);
const saldoInicial = () => SALDO_INICIAL_ANO[CURRENT_YEAR] ?? 0;

/* ── META POR MÊS ── */
function getMeta(mesId) {
  return METAS[mesId] ?? META_PADRAO;
}

/* ── FIRESTORE: listener de metas ── */
function subscribeMetas() {
  if (unsubListeners['metas']) return;
  const ref = doc(db, `users/${uid}/${CURRENT_YEAR}/metas`);
  unsubListeners['metas'] = onSnapshot(ref, snap => {
    if (snap.exists()) {
      METAS = snap.data();
    } else {
      METAS = {};
    }
    // re-renderiza o mês ativo se for um mês específico
    const activeView = document.querySelector('.view.active');
    if (activeView && activeView.id !== 'view-anual') {
      const mesId = activeView.id.replace('view-','');
      if (MESES_IDS.includes(mesId)) renderMes(mesId);
    }
    renderAnual();
  });
}

window.openModalMeta = (mesId) => {
  editingMetaMes = mesId;
  const idx = MESES_IDS.indexOf(mesId);
  document.getElementById('modalMetaSub').textContent = MESES_NOMES[idx] + ' ' + CURRENT_YEAR;
  document.getElementById('fMetaValor').value = METAS[mesId] ?? '';
  document.getElementById('modalMetaOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fMetaValor').focus(), 250);
};

window.closeModalMeta = () => {
  document.getElementById('modalMetaOverlay').classList.remove('open');
  editingMetaMes = null;
};

window.salvarMeta = async () => {
  const btn = document.querySelector('#modalMetaOverlay .btn-save');
  btn.disabled = true; btn.textContent = 'Salvando…';
  try {
    const val = parseFloat(document.getElementById('fMetaValor').value);
    const ref  = doc(db, `users/${uid}/${CURRENT_YEAR}/metas`);
    if (!val || val <= 0) {
      // remove a meta customizada — volta pro padrão
      const { [editingMetaMes]: _, ...rest } = METAS;
      await setDoc(ref, rest);
    } else {
      await setDoc(ref, { ...METAS, [editingMetaMes]: val }, { merge: true });
    }
    closeModalMeta();
    showToast('Meta salva! ✓');
  } catch(e) {
    showToast('Erro ao salvar meta: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Salvar meta';
  }
};

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function animateBars(container) {
  requestAnimationFrame(() => {
    container.querySelectorAll('.cat-bar-fill').forEach(bar => {
      setTimeout(() => { bar.style.width = (bar.dataset.pct || 0) + '%'; }, 80);
    });
  });
}

/* ── ANO DINÂMICO ── */
function changeYear(delta) {
  const newYear = CURRENT_YEAR + delta;
  // não navega para anos futuros além do próximo
  if (newYear > new Date().getFullYear() + 1) return;
  CURRENT_YEAR = newYear;
  document.getElementById('yearDisplay').textContent = CURRENT_YEAR;
  // cancela listeners anteriores e recarrega
  Object.values(unsubListeners).forEach(fn => fn());
  unsubListeners = {};
  resetData();
  METAS = {};
  // reseta tags
  MESES_IDS.forEach(id => {
    const tag = document.getElementById('tag-'+id);
    if(tag) { tag.className = 'nav-tag loading'; tag.textContent = '…'; }
  });
  subscribeAll();
  renderAnual();
}

/* ── COMPUTED ── */
function computeMes(mesId) {
  const d = DATA[mesId];
  const totalGastos   = d.gastos.reduce((a,g) => a+g.valor, 0);
  const totalReceita  = d.receitas.reduce((a,r) => a+r.valor, 0);
  const totalRend     = d.rendimentos.reduce((a,r) => a+r.valor, 0);
  const totalEntradas = totalReceita + totalRend;
  const economiaReal  = totalEntradas - totalGastos;
  const catWeeks = {};
  CATS.forEach(c => { catWeeks[c] = [0,0,0,0]; });
  d.gastos.forEach(g => {
    const sem = Math.max(0, Math.min(3, (g.semana||1)-1));
    if (catWeeks[g.categoria]) catWeeks[g.categoria][sem] += g.valor;
  });
  return { totalGastos, totalReceita, totalRend, totalEntradas, economiaReal, catWeeks };
}

function computeSaldos() {
  const saldos = {};
  let acumulado = saldoInicial();
  MESES_IDS.forEach(id => {
    acumulado += computeMes(id).economiaReal;
    saldos[id] = acumulado;
  });
  return saldos;
}

/* ── AUTH ── */
let authMode = 'login';
window.setAuthMode = mode => {
  authMode = mode;
  document.getElementById('authBtn').textContent = mode === 'login' ? 'Entrar' : 'Criar conta';
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && mode==='login') || (i===1 && mode==='register'));
  });
  document.getElementById('authError').style.display = 'none';
};

window.handleAuth = async () => {
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  const errEl = document.getElementById('authError');
  const btn   = document.getElementById('authBtn');
  if (!email || !pass) { errEl.textContent='Preencha e-mail e senha.'; errEl.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Aguarde…';
  try {
    authMode === 'login'
      ? await signInWithEmailAndPassword(auth, email, pass)
      : await createUserWithEmailAndPassword(auth, email, pass);
    errEl.style.display = 'none';
  } catch(e) {
    const msgs = {
      'auth/invalid-email':'E-mail inválido.',
      'auth/user-not-found':'Usuário não encontrado.',
      'auth/wrong-password':'Senha incorreta.',
      'auth/email-already-in-use':'E-mail já cadastrado.',
      'auth/weak-password':'Senha fraca (mín. 6 caracteres).',
      'auth/invalid-credential':'E-mail ou senha incorretos.'
    };
    errEl.textContent = msgs[e.code] || 'Erro: ' + e.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Entrar' : 'Criar conta';
  }
};

window.handleLogout = async () => {
  Object.values(unsubListeners).forEach(fn => fn());
  unsubListeners = {};
  resetData();
  await signOut(auth);
  // onAuthStateChanged vai chamar showAuth automaticamente
};

document.getElementById('authEmail').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('authPass').focus(); });
document.getElementById('authPass').addEventListener('keydown', e => { if(e.key==='Enter') window.handleAuth(); });

/* ── FIRESTORE LISTENERS ── */
function subscribeMonth(mesId) {
  const base = `users/${uid}/${CURRENT_YEAR}/${mesId}`;
  let loaded = { gastos:false, receitas:false, rendimentos:false };
  const tryRender = () => {
    if (loaded.gastos && loaded.receitas && loaded.rendimentos) renderMes(mesId);
  };
  unsubListeners[`${mesId}_g`] = onSnapshot(
    query(collection(db, base+'/gastos'), orderBy('createdAt','asc')),
    snap => { DATA[mesId].gastos = snap.docs.map(d=>({id:d.id,...d.data()})); loaded.gastos=true; tryRender(); }
  );
  unsubListeners[`${mesId}_r`] = onSnapshot(
    query(collection(db, base+'/receitas'), orderBy('createdAt','asc')),
    snap => { DATA[mesId].receitas = snap.docs.map(d=>({id:d.id,...d.data()})); loaded.receitas=true; tryRender(); }
  );
  unsubListeners[`${mesId}_rd`] = onSnapshot(
    query(collection(db, base+'/rendimentos'), orderBy('createdAt','asc')),
    snap => { DATA[mesId].rendimentos = snap.docs.map(d=>({id:d.id,...d.data()})); loaded.rendimentos=true; tryRender(); }
  );
}

function subscribeAll() {
  MESES_IDS.forEach(id => subscribeMonth(id));
  subscribeMetas();
}

/* ── EXPORTAÇÃO CSV ── */
window.exportarCSV = (mesId) => {
  const ano = CURRENT_YEAR;
  const linhas = [['Tipo','Descrição','Categoria','Semana','Valor']];
  const d = DATA[mesId];
  d.gastos.forEach(g => linhas.push(['Gasto', g.desc||'', g.categoria, `Semana ${g.semana}`, g.valor.toFixed(2).replace('.',',')]));
  d.receitas.forEach(r => linhas.push(['Receita', r.desc||'', '—', `Semana ${r.semana}`, r.valor.toFixed(2).replace('.',',')]));
  d.rendimentos.forEach(r => linhas.push(['Rendimento', r.desc||'', '—', '—', r.valor.toFixed(2).replace('.',',')]));
  const csv = '\uFEFF' + linhas.map(l => l.map(c => `"${c}"`).join(';')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url;
  const mesNome = MESES_NOMES[MESES_IDS.indexOf(mesId)];
  a.download = `financeiro_${mesNome}_${ano}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV exportado! ✓');
};

window.exportarCSVAnual = () => {
  const ano = CURRENT_YEAR;
  const linhas = [['Mês','Tipo','Descrição','Categoria','Semana','Valor']];
  MESES_IDS.forEach((mesId,i) => {

    d.receitas.forEach(r => linhas.push([mesNome,'Receita',r.desc||'','—',`Semana ${r.semana}`,r.valor.toFixed(2).replace('.',',')]));
    d.rendimentos.forEach(r => linhas.push([mesNome,'Rendimento',r.desc||'','—','—',r.valor.toFixed(2).replace('.',',')]));
  });
  const csv = '\uFEFF' + linhas.map(l => l.map(c => `"${c}"`).join(';')).join('\n');

  const url = URL.createObjectURL(blob);

  showToast('CSV anual exportado! ✓');
};

/* ── RENDER MÊS ── */
function renderMes(mesId) {
  const idx = MESES_IDS.indexOf(mesId);
  const label = MESES_NOMES[idx];
  const { totalGastos, totalReceita, totalRend, totalEntradas, economiaReal, catWeeks } = computeMes(mesId);
  const saldos = computeSaldos();
  const saldoAnterior = idx===0 ? saldoInicial() : saldos[MESES_IDS[idx-1]];
  const saldoAtual = saldos[mesId];
  const isEmpty = totalEntradas===0 && totalGastos===0;

  const tag = document.getElementById('tag-'+mesId);
  tag.className = isEmpty ? 'nav-tag empty' : 'nav-tag';
  tag.textContent = isEmpty ? '—' : '✓';

  const section = document.getElementById('view-'+mesId);
  section.innerHTML = '';

  // Header
  const header = document.createElement('div');
  header.className = 'page-header';
  header.innerHTML = `<h1>${label} ${CURRENT_YEAR}</h1>
    <p>Saldo anterior: ${fmtVal(saldoAnterior)} · Saldo atual: <strong style="color:var(--accent)">${fmtVal(saldoAtual)}</strong></p>`;
  section.appendChild(header);

  // Ações
  const acoes = document.createElement('div');
  acoes.style.cssText = 'display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:24px';
  acoes.innerHTML = `
    <button class="btn-add-primary" onclick="openModal('${mesId}')">＋ Novo lançamento</button>
    ${!isEmpty ? `
    <button class="btn-export" onclick="exportarCSV('${mesId}')">⬇ CSV</button>
    <button class="btn-export" onclick="exportarPDF('${mesId}')">⬇ PDF</button>
    ` : ''}
  `;
  section.appendChild(acoes);

  if (isEmpty) {
    const emptyDiv = document.createElement('div');
    emptyDiv.className = 'empty-state';
    emptyDiv.innerHTML = `<div class="icon">📋</div><div class="title">Nenhum lançamento ainda</div><div class="sub">${label} ${CURRENT_YEAR} ainda não tem receitas ou gastos registrados.</div>`;
    section.appendChild(emptyDiv);
    renderAnual(); return;
  }

  // Stat cards
  const economiaPct = pct(economiaReal, totalEntradas);
  const grid = document.createElement('div');
  grid.className = 'stat-grid';
  grid.innerHTML = `
    <div class="stat-card"><span class="stat-label">Receita Total</span><span class="stat-value">${fmtVal(totalReceita)}</span></div>
    <div class="stat-card"><span class="stat-label">Rendimentos</span><span class="stat-value${totalRend>0?' green':''}">${totalRend>0?fmtVal(totalRend):'—'}</span></div>
    <div class="stat-card"><span class="stat-label">Total Entradas</span><span class="stat-value green">${fmtVal(totalEntradas)}</span></div>
    <div class="stat-card"><span class="stat-label">Total Gastos</span><span class="stat-value red">${fmtVal(totalGastos)}</span></div>
    <div class="stat-card"><span class="stat-label">Economia Real</span><span class="stat-value ${economiaReal>=(getMeta(mesId))?'green':'red'}">${fmtVal(economiaReal)}</span><span class="stat-badge ${economiaPct>=40?'badge-green':'badge-red'}">${economiaPct}% da receita</span></div>
    <div class="stat-card"><span class="stat-label">Saldo Atual</span><span class="stat-value accent">${fmtVal(saldoAtual)}</span><span class="stat-sub">Anterior: ${fmtVal(saldoAnterior)}</span></div>
    <div class="stat-card"><span class="stat-label">Saldo Atual</span><span class="stat-value accent">${fmtVal(saldoAtual)}</span><span class="stat-sub">Anterior: ${fmtVal(saldoAnterior)}</span></div>
  `;
  section.appendChild(grid);

  // ── META CARD ──
  const metaValor   = getMeta(mesId);
  const metaPerc    = Math.min(100, totalEntradas > 0 ? (economiaReal / metaValor) * 100 : 0);
  const metaAtingida = economiaReal >= metaValor;
  const metaCard = document.createElement('div');
  metaCard.className = `meta-card ${metaAtingida ? 'atingida' : 'nao-atingida'}`;
  metaCard.innerHTML = `
    <div class="meta-top">
      <div class="meta-info">
        <span class="meta-label">Meta de Economia — ${label} ${CURRENT_YEAR}</span>
        <span class="meta-valor ${metaAtingida?'green':'red'}">${fmtVal(metaValor)}</span>
      </div>
      <button class="meta-edit-btn" onclick="openModalMeta('${mesId}')">✏️ Editar meta</button>
    </div>
    <div class="meta-progress-bg">
      <div class="meta-progress-fill" data-pct="${Math.max(0,metaPerc.toFixed(1))}"
        style="background:${metaAtingida?'var(--green)':'var(--red)'};width:0%"></div>
    </div>
    <div class="meta-sub-row">
      <span>Economia atual: <strong style="color:${metaAtingida?'var(--green)':'var(--red)'}">${fmtVal(economiaReal)}</strong></span>
      <span class="badge ${metaAtingida?'badge-green':'badge-red'}">
        ${metaAtingida ? '✓ Meta atingida' : `${Math.round(metaPerc)}% da meta`}
      </span>
    </div>
  `;
  section.appendChild(metaCard);

  // Category bars
  const secCat = document.createElement('p');
  secCat.className = 'section-title'; secCat.textContent = 'Gastos por Categoria';
  section.appendChild(secCat);
  const catList = document.createElement('div');
  catList.className = 'cat-list';
  CATS.forEach((cat,i) => {
    const total = catWeeks[cat].reduce((a,b)=>a+b,0);
    const perc  = totalGastos>0 ? (total/totalGastos)*100 : 0;
    const color = CAT_COLORS[i];
    const item  = document.createElement('div');
    item.className = 'cat-item';
    item.innerHTML = `
      <div class="cat-header">
        <div class="cat-name-row">
          <div class="cat-icon" style="background:${color}22">${CAT_ICONS[i]}</div>
          <span class="cat-name">${cat}</span>
        </div>
        <span class="cat-amount" style="color:${total>0?color:'var(--muted)'}">${total>0?fmtVal(total):'—'}</span>
      </div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" data-pct="${perc.toFixed(1)}" style="background:${color};width:0%"></div></div>
    `;
    catList.appendChild(item);
  });
  section.appendChild(catList);

  // Weekly table
  const secWeek = document.createElement('p');
  secWeek.className = 'section-title'; secWeek.textContent = 'Breakdown Semanal';
  section.appendChild(secWeek);
  const scrollHint = document.createElement('p');
  scrollHint.className = 'week-scroll-hint';
  scrollHint.textContent = '← deslize para ver todas as semanas';
  scrollHint.style.cssText = 'display:none';
  if (window.innerWidth<=720) scrollHint.style.display='block';
  section.appendChild(scrollHint);
  const wrap = document.createElement('div');
  wrap.className = 'week-table-wrap';
  const weekTotals = [0,1,2,3].map(wi=>CATS.reduce((a,c)=>a+(catWeeks[c][wi]||0),0));
  let rows = CATS.map((cat,i) => {
    const ws = catWeeks[cat]; const tot = ws.reduce((a,b)=>a+b,0);
    return `<tr><td><div class="cat-cell"><div class="cat-dot" style="background:${CAT_COLORS[i]}"></div>${cat}</div></td>
      ${ws.map(w=>`<td class="num-cell${w>0?' has-value':''}">${w>0?fmtVal(w):'—'}</td>`).join('')}
      <td class="num-cell${tot>0?' has-value':''}">${tot>0?fmtVal(tot):'—'}</td></tr>`;
  }).join('');
  rows += `<tr class="total-row"><td>TOTAL</td>${weekTotals.map(w=>`<td class="num-cell has-value">${w>0?fmtVal(w):'—'}</td>`).join('')}<td class="num-cell has-value">${fmtVal(totalGastos)}</td></tr>`;
  wrap.innerHTML = `<table class="week-table"><thead><tr><th>Categoria</th><th>Sem. 1</th><th>Sem. 2</th><th>Sem. 3</th><th>Sem. 4</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table>`;
  section.appendChild(wrap);

  // Entradas
  const secRec = document.createElement('p');
  secRec.className = 'section-title'; secRec.textContent = 'Entradas';
  section.appendChild(secRec);
  section.appendChild(buildIncomeBlock('RECEITAS', DATA[mesId].receitas, mesId, 'receitas'));
  if (DATA[mesId].rendimentos.length > 0 || totalRend > 0) {
    section.appendChild(buildIncomeBlock('RENDIMENTOS', DATA[mesId].rendimentos, mesId, 'rendimentos'));
  }

  // Gastos detalhados (lista editável)
  const secGastos = document.createElement('p');
  secGastos.className = 'section-title'; secGastos.textContent = 'Gastos Detalhados';
  section.appendChild(secGastos);
  section.appendChild(buildIncomeBlock('GASTOS', DATA[mesId].gastos, mesId, 'gastos'));

  setTimeout(() => {
    animateBars(section);
    // anima barra da meta
    section.querySelectorAll('.meta-progress-fill').forEach(bar => {
      bar.style.width = (bar.dataset.pct || 0) + '%';
    });
  }, 80);
  renderAnual();
}

function buildIncomeBlock(label, items, mesId, tipo) {
  const block = document.createElement('div');
  block.className = 'income-block';
  const total = items.reduce((a,r) => a+r.valor, 0);
  const totalColor = tipo==='gastos' ? 'var(--red)' : 'var(--green)';
  block.innerHTML = `<div class="income-block-head"><span>${label}</span><span style="color:${totalColor}">${total>0?fmtVal(total):'—'}</span></div>`;
  if (items.length===0) {
    block.innerHTML += `<div class="income-row"><span class="desc" style="color:var(--muted)">Nenhum registro</span></div>`;
  } else {
    items.forEach(r => {
      const row = document.createElement('div');
      row.className = 'income-row';
      const valColor = tipo==='gastos' ? 'var(--red)' : 'var(--green)';
      const semTag = r.semana ? `<span class="week-tag">Sem. ${r.semana}</span>` : '';
      const catTag = r.categoria ? `<span class="week-tag" style="color:${CAT_COLORS[CATS.indexOf(r.categoria)]}aa">${r.categoria}</span>` : '';
      row.innerHTML = `
        <span class="desc">${r.desc||label}${semTag}${catTag}</span>
        <span class="val" style="color:${valColor}">${fmtVal(r.valor)}</span>
        <div class="row-actions">
          <button class="btn-row-action edit" title="Editar" onclick="editarItem('${mesId}','${tipo}','${r.id}')">✏️</button>
          <button class="btn-row-action del" title="Excluir" onclick="deletarItem('${mesId}','${tipo}','${r.id}')">✕</button>
        </div>
      `;
      block.appendChild(row);
    });
  }
  return block;
}

/* ── RENDER ANUAL ── */
function renderAnual() {
  const section = document.getElementById('view-anual');
  section.innerHTML = '';
  const saldos = computeSaldos();

  // Saldo mais recente com dados
  const ultimoMesComDados = [...MESES_IDS].reverse().find(id => {
    const c = computeMes(id); return c.totalEntradas>0 || c.totalGastos>0;
  });
  const saldoAtualMostrado = ultimoMesComDados ? saldos[ultimoMesComDados] : saldoInicial();

  const header = document.createElement('div');
  header.className = 'page-header';
  header.innerHTML = `<h1>Resumo Anual ${CURRENT_YEAR}</h1>
    <p>Visão consolidada de todos os meses · saldo atual <strong style="color:var(--accent)">${fmtVal(saldoAtualMostrado)}</strong></p>`;
  section.appendChild(header);

  // Botões de exportação anual
  const exportRow = document.createElement('div');
  exportRow.className = 'export-row';
  exportRow.innerHTML = `
    <button class="btn-export" onclick="exportarCSVAnual()">⬇ CSV Anual completo</button>
  `;
  section.appendChild(exportRow);

  let totalEntradasAnual=0, totalGastosAnual=0, totalEconomiaAnual=0;
  MESES_IDS.forEach(id => {
    const c = computeMes(id);
    totalEntradasAnual += c.totalEntradas;
    totalGastosAnual   += c.totalGastos;
    totalEconomiaAnual += c.economiaReal;
  });
  const saldoAtualAnual = saldoInicial() + totalEconomiaAnual;
  const percEco = pct(totalEconomiaAnual, totalEntradasAnual);
  const mesesAtivos = MESES_IDS.filter(id => computeMes(id).totalEntradas>0).length;

  const grid = document.createElement('div');
  grid.className = 'stat-grid';
  grid.innerHTML = `
    <div class="stat-card"><span class="stat-label">Total Entradas</span><span class="stat-value green">${fmtVal(totalEntradasAnual)}</span><span class="stat-sub">Ano até agora</span></div>
    <div class="stat-card"><span class="stat-label">Total Gastos</span><span class="stat-value red">${fmtVal(totalGastosAnual)}</span><span class="stat-sub">Média ${fmtVal(totalGastosAnual/Math.max(1,mesesAtivos))}/mês</span></div>
    <div class="stat-card"><span class="stat-label">Economia Real</span><span class="stat-value green">${fmtVal(totalEconomiaAnual)}</span><span class="stat-badge ${percEco>=40?'badge-green':'badge-red'}">${percEco}% da receita</span></div>
    <div class="stat-card"><span class="stat-label">Saldo Atual</span><span class="stat-value accent">${fmtVal(saldoAtualAnual)}</span><span class="stat-sub">Partindo de ${fmtVal(saldoInicial())}</span></div>
  `;
  section.appendChild(grid);

  // Chart
  const chartWrap = document.createElement('div');
  chartWrap.className = 'chart-wrap';
  chartWrap.innerHTML = `<div class="chart-title">Saldo Acumulado — Evolução Mensal</div><canvas id="chartSaldo" height="120"></canvas>`;
  section.appendChild(chartWrap);

  // Cats anual
  const secCat = document.createElement('p');
  secCat.className = 'section-title'; secCat.textContent = 'Gastos por Categoria — Acumulado Anual';
  section.appendChild(secCat);
  const catList = document.createElement('div');
  catList.className = 'cat-list';
  const catTotals = CATS.map(cat => MESES_IDS.reduce((a,id) => {
    const c = computeMes(id);
    return a + (c.catWeeks[cat]||[0,0,0,0]).reduce((x,y)=>x+y,0);
  },0));
  const maxCat = Math.max(...catTotals, 1);
  const totalGeral = catTotals.reduce((a,b)=>a+b,0);
  CATS.forEach((cat,i) => {
    const total = catTotals[i];
    const perc  = (total/maxCat)*100;
    const percOfTotal = totalGeral>0 ? ((total/totalGeral)*100).toFixed(1) : 0;
    const color = CAT_COLORS[i];
    const item  = document.createElement('div');
    item.className = 'cat-item';
    item.innerHTML = `
      <div class="cat-header">
        <div class="cat-name-row">
          <div class="cat-icon" style="background:${color}22">${CAT_ICONS[i]}</div>
          <div><div class="cat-name">${cat}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${percOfTotal}% dos gastos totais</div></div>
        </div>
        <span class="cat-amount" style="color:${total>0?color:'var(--muted)'}">${total>0?fmtVal(total):'—'}</span>
      </div>

function drawChart(saldos) {
  const canvas = document.getElementById('chartSaldo');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const isMobile = window.innerWidth<=720;
  const filteredIds = isMobile
    ? MESES_IDS.filter(id => { const c=computeMes(id); return c.totalEntradas>0||c.totalGastos>0; })
    : MESES_IDS;
  const labels = filteredIds.map(id=>MESES_NOMES[MESES_IDS.indexOf(id)].substring(0,3));
  const values = filteredIds.map(id=>saldos[id]);

  function draw() {
    const W = canvas.parentElement.clientWidth-40, H=130;
    canvas.width=W; canvas.height=H;
    const pad={top:14,right:20,bottom:28,left:72};
    const iW=W-pad.left-pad.right, iH=H-pad.top-pad.bottom;
    const max=Math.max(...values,saldoInicial())*1.1;
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<=4;i++){
      const y=pad.top+iH-(iH*i/4), v=max*i/4;
      ctx.strokeStyle='#2A2F45';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
      ctx.setLineDash([]);ctx.fillStyle='#6B7280';ctx.font='10px Inter';ctx.textAlign='right';
      ctx.fillText('R$'+Math.round(v/1000)+'k',pad.left-6,y+3);
    }
    if(values.length<2){return;}
    const pts=values.map((v,i)=>({x:pad.left+(i/(values.length-1))*iW,y:pad.top+iH-(v/max)*iH}));
    const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+iH);
    grad.addColorStop(0,'rgba(124,58,237,0.28)');grad.addColorStop(1,'rgba(124,58,237,0)');
    ctx.beginPath();ctx.moveTo(pts[0].x,pad.top+iH);
    pts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,pad.top+iH);
    ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.strokeStyle='#7C3AED';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();
    pts.forEach((p,i)=>{
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fillStyle='#7C3AED';ctx.fill();ctx.strokeStyle='#0F1117';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#6B7280';ctx.font='11px Inter';ctx.textAlign='center';
      ctx.fillText(labels[i],p.x,H-6);
    });
  }
  draw();
  window.addEventListener('resize',draw);
}

window.openModal = (mesId) => {

window.editarItem = (mesId, tipo, itemId) => {
  const lista = DATA[mesId][tipo];
  const item  = lista.find(x=>x.id===itemId);
  if (!item) return;
  currentMes = mesId;
  editingItem = { mesId, tipo, id: itemId };
  const idx = MESES_IDS.indexOf(mesId);
  document.getElementById('modalTitle').textContent = 'Editar lançamento';
  document.getElementById('modalSub').textContent   = MESES_NOMES[idx] + ' ' + CURRENT_YEAR;
  document.getElementById('btnSalvar').textContent  = 'Salvar alterações';
  // desabilita as outras tabs durante edição
  document.querySelectorAll('.modal-tab').forEach(t=>t.disabled=true);
  clearModalFields();
  if (tipo==='gastos') {
    setModalTab('gasto');
    document.getElementById('fCategoria').value  = item.categoria||'Alimentação';
    document.getElementById('fSemana').value     = item.semana||1;
    document.getElementById('fValorGasto').value = item.valor||'';
    document.getElementById('fDescGasto').value  = item.desc||'';
    document.querySelector('.modal-tab').disabled = false; // só habilita a tab ativa
  } else if (tipo==='receitas') {
    setModalTab('receita');
    document.getElementById('fDescReceita').value   = item.desc||'';
    document.getElementById('fValorReceita').value  = item.valor||'';
    document.getElementById('fSemanaReceita').value = item.semana||1;
    document.querySelectorAll('.modal-tab')[1].disabled = false;
  } else {
    setModalTab('rendimento');
    document.getElementById('fDescRend').value  = item.desc||'';
    document.getElementById('fValorRend').value = item.valor||'';
    document.querySelectorAll('.modal-tab')[2].disabled = false;
  }
  document.getElementById('modalOverlay').classList.add('open');
};

window.closeModal = () => {
  document.getElementById('modalOverlay').classList.remove('open');
  clearModalFields();
  editingItem = null;
};

function clearModalFields() {
  ['fValorGasto','fDescGasto','fValorReceita','fDescReceita','fValorRend','fDescRend'].forEach(id=>{
    const el = document.getElementById(id); if(el) el.value='';
  });
}

window.setModalTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll('.modal-tab').forEach((t,i)=>{
    t.classList.toggle('active',['gasto','receita','rendimento'][i]===tab);
  });
  document.getElementById('formGasto').style.display      = tab==='gasto'       ? '' : 'none';
  document.getElementById('formReceita').style.display    = tab==='receita'     ? '' : 'none';
  document.getElementById('formRendimento').style.display = tab==='rendimento'  ? '' : 'none';

/* ── SALVAR (novo ou edição) ── */
window.salvarLancamento = async () => {
  const btn = document.getElementById('btnSalvar');
  btn.disabled=true; btn.textContent='Salvando…';
  try {
    const base = `users/${uid}/${CURRENT_YEAR}/${currentMes}`;
    let payload = {};
    let colecao = '';

    if (currentTab==='gasto') {
      const valor = parseFloat(document.getElementById('fValorGasto').value);
      if (!valor||valor<=0) throw new Error('Valor inválido.');
      payload = { categoria:document.getElementById('fCategoria').value, semana:parseInt(document.getElementById('fSemana').value), valor, desc:document.getElementById('fDescGasto').value||'' };
      colecao = 'gastos';
    } else if (currentTab==='receita') {
      const valor = parseFloat(document.getElementById('fValorReceita').value);
      if (!valor||valor<=0) throw new Error('Valor inválido.');
      payload = { desc:document.getElementById('fDescReceita').value||'Receita', valor, semana:parseInt(document.getElementById('fSemanaReceita').value) };
      colecao = 'receitas';
    } else {
      const valor = parseFloat(document.getElementById('fValorRend').value);
      if (!valor||valor<=0) throw new Error('Valor inválido.');
      payload = { desc:document.getElementById('fDescRend').value||'Rendimento', valor };
      colecao = 'rendimentos';
    }

    if (editingItem) {
      // EDIÇÃO: updateDoc no documento existente
      await updateDoc(doc(db, `users/${uid}/${CURRENT_YEAR}/${editingItem.mesId}/${editingItem.tipo}/${editingItem.id}`), payload);
      showToast('Lançamento atualizado! ✓');
    } else {
      // NOVO: addDoc
      await addDoc(collection(db, base+'/'+colecao), { ...payload, createdAt: serverTimestamp() });
      showToast('Lançamento salvo! ✓');
    }
    closeModal();
  } catch(e) {
    showToast(e.message||'Erro ao salvar.','error');
  } finally {
    btn.disabled=false;
    btn.textContent = editingItem ? 'Salvar alterações' : 'Salvar';
  }
};

};

};

/* ── HELPERS DE TRANSIÇÃO ── */
function showSplash() {
  const s = document.getElementById('splashScreen');
  s.classList.remove('hidden');
}
function hideSplash() {
  const s = document.getElementById('splashScreen');
  s.classList.add('hidden');
}
function showAuth() {
  hideSplash();
  const a = document.getElementById('authScreen');
  a.classList.add('visible');
  document.getElementById('appShell').classList.remove('visible');
}
function showApp() {
  hideSplash();
  const a = document.getElementById('authScreen');
  a.classList.remove('visible');
  // pequeno delay para o fade ser percetível
  requestAnimationFrame(() => {
    document.getElementById('appShell').classList.add('visible');
  });
}

onAuthStateChanged(auth, user => {
  if (user) {
    uid = user.uid;
    CURRENT_YEAR = new Date().getFullYear();
    document.getElementById('yearDisplay').textContent = CURRENT_YEAR;
    const email = user.email||'';
    document.getElementById('userEmail').textContent = email;
    document.getElementById('userAvatar').textContent = email[0]?.toUpperCase()||'U';
    initNav();
    subscribeAll();
    renderAnual();
    // mostra o app com fade — aguarda 300ms mínimos para a splash bar completar
    setTimeout(showApp, 300);

    // checa seed apenas para o ano atual e apenas para 2026
    if (CURRENT_YEAR===2026) {
      const checkEmpty = onSnapshot(
        query(collection(db,`users/${uid}/2026/jan/receitas`),orderBy('createdAt','asc')),
        snap => {
          checkEmpty();
          if (snap.empty) {
            const bar = document.createElement('div');
            bar.className='seed-bar';
            bar.style.cssText='grid-column:1/-1;background:#1a1425;border-bottom:1px solid #3b1f6e;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:13px;color:#a78bfa;flex-wrap:wrap';
            bar.innerHTML=`<span>📥 Importar dados históricos de Jan–Jun 2026 da sua planilha?</span>
              <button id="btnSeed" onclick="importarDadosHistoricos()" style="background:#7C3AED;border:none;color:#fff;padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">Importar dados históricos</button>`;
            document.querySelector('.topbar').insertAdjacentElement('afterend',bar);
          }
        }
      );
    }
  } else {
    uid=null;
    document.getElementById('authBtn').disabled=false;
    document.getElementById('authBtn').textContent='Entrar';
    // mostra tela de auth com fade
    setTimeout(showAuth, 200);
  }
});
</script>
</body>
</html>
